name: Capsule Wardrobe Supabase ping
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health check
        run: |
          curl -X GET "https://aygtfzmubfibphaymdvd.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_CAPSULE_WARDROBE }}"
